# nginx reverse proxy for the Varco Home Assistant showcase LXC.
#
# This file is the source of truth for the showcase ingress. The deploy script
# installs it to /etc/nginx/sites-available/varco and enables it. nginx owns
# host port 80; the Home Assistant container binds 127.0.0.1:8123 and the
# varco-bridge container binds 127.0.0.1:8787, so neither competes for :80.
#
# Public hostnames (Cloudflare proxied) route here:
#   varco-ha.andreabaccega.com     -> Home Assistant (127.0.0.1:8123)
#   varco-bridge.andreabaccega.com -> varco-bridge   (127.0.0.1:8787)
# The sslip.io default server keeps direct-IP access working for CI.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 2a01-4f8-171-3481--106.sslip.io;

    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location = /health { proxy_pass http://127.0.0.1:8787; }
    location /presence/ { proxy_pass http://127.0.0.1:8787; }
    location /authority/ { proxy_pass http://127.0.0.1:8787; }
    location /consumer/ { proxy_pass http://127.0.0.1:8787; }
    location / { proxy_pass http://127.0.0.1:8123; }
}

server {
    listen 80;
    listen [::]:80;
    server_name varco-ha.andreabaccega.com;

    proxy_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location / {
        proxy_pass http://127.0.0.1:8123;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name varco-bridge.andreabaccega.com;

    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location / {
        proxy_pass http://127.0.0.1:8787;
    }
}
