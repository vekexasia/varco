services:
  homeassistant:
    # Default pinned to Home Assistant 2026.6.1 by multi-arch index digest for reproducible deploys.
    image: ghcr.io/home-assistant/home-assistant:${HOME_ASSISTANT_VERSION:-2026.6.1@sha256:59aa8824955c9db491b75d2eebe42bd68494f80c2ec69ec0d66d9dae37d37514}
    container_name: varco-ha-showcase
    restart: unless-stopped
    ports:
      # nginx on the host owns port 80 and reverse-proxies to this. Bind to
      # localhost so Home Assistant never competes for the host :80 binding.
      - "127.0.0.1:${HA_HTTP_PORT:-8123}:8123"
    environment:
      TZ: Europe/Rome
    volumes:
      - ./config:/config
      - ${VARCO_INTEGRATION_PATH:-../../custom_components/varco}:/config/custom_components/varco:ro

  varco-bridge:
    # Relay-first bridge backing varco-bridge.andreabaccega.com. nginx proxies
    # /health, /presence/, /authority/, /consumer/ here. Pulled from GHCR.
    image: ghcr.io/vekexasia/varco-bridge:${VARCO_BRIDGE_VERSION:-0.1.1}
    container_name: varco-bridge
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BRIDGE_HTTP_PORT:-8787}:8787"
    environment:
      HOST: 0.0.0.0
      PORT: 8787
    command: ["node", "bridge/dist/node.js"]
