name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to release, without leading v"
        required: true
      publish_npm:
        description: "Publish @varco/client to npm"
        type: boolean
        default: true

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Check npm trusted publishing prerequisites
        run: |
          node --version
          npm --version
          node -e "const v=require('node:child_process').execFileSync('npm',['--version'],{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) process.exit(1);"

      - name: Install dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-ci.txt

      - name: Check release versions
        run: npm run release:check-version -- ${{ steps.version.outputs.version }}

      - name: Run tests
        run: npm test

      - name: Run type checks
        run: npm run check

      - name: Build packages and docs
        run: |
          npm run build
          npm run docs:build

      - name: Dry-run npm package
        run: npm --workspace packages/client pack --dry-run

      - name: Build Home Assistant release artifact
        run: |
          set -euo pipefail
          mkdir -p .pi/release
          zip -r .pi/release/varco-home-assistant.zip custom_components/varco hacs.json README.md


      - name: Publish bridge Docker image to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          MAJOR_MINOR: ${{ steps.version.outputs.major_minor }}
          MAJOR: ${{ steps.version.outputs.major }}
        shell: bash
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/varco-bridge"
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker build \
            -f bridge/Dockerfile \
            --label "org.opencontainers.image.description=Varco opaque Node bridge" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${MAJOR_MINOR}" \
            -t "${IMAGE}:${MAJOR}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:${MAJOR_MINOR}"
          docker push "${IMAGE}:${MAJOR}"
          docker push "${IMAGE}:latest"
      - name: Publish @varco/client to npm
        if: ${{ github.event_name == 'push' || inputs.publish_npm }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          if npm dist-tag ls @varco/client 2>/dev/null | grep -Eq "^[^:]+: ${VERSION}$"; then
            echo "@varco/client@$VERSION is already published; skipping npm publish."
            exit 0
          fi
          # Uses npm Trusted Publishing for this GitHub Actions workflow.
          npm --workspace packages/client publish --access public --provenance

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" .pi/release/varco-home-assistant.zip --clobber
          else
            gh release create "$TAG" .pi/release/varco-home-assistant.zip \
              --title "$TAG" \
              --notes "Varco $TAG release. Home Assistant integration artifact: varco-home-assistant.zip. The browser client is published as @varco/client when NPM_TOKEN is configured."
          fi
