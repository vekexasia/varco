name: Build docs artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "README.md"
      - "docs/website/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-docs.yml"

permissions:
  contents: read

concurrency:
  group: docs-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        env:
          SITE_URL: https://vekexasia.github.io
          SITE_BASE_PATH: /varco
        run: npm run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: varco-docs-site
          path: docs/website/dist
