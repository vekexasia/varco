name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: python -m pip install pytest cryptography

      - name: Run unit and integration tests
        run: npm test

      - name: Run type checks
        run: npm run check

      - name: Build local Home Assistant dashboard assets
        run: npm run dev:ha:local-assets

      - name: Prepare Home Assistant e2e config
        run: |
          set -euo pipefail
          docker pull ghcr.io/home-assistant/home-assistant:2026.6.1
          rm -rf .pi/ci-ha-config
          mkdir -p .pi/ci-ha-config/.storage
          python - <<'PY'
          from pathlib import Path

          source = Path('dev/home-assistant/config/configuration.yaml').read_text().splitlines()
          output = []
          skip = False
          for line in source:
              if line.startswith('varco:'):
                  skip = True
                  continue
              if skip and (line.startswith(' ') or not line.strip()):
                  continue
              skip = False
              output.append(line)
          Path('.pi/ci-ha-config/configuration.yaml').write_text('\n'.join(output) + '\n')
          PY
          cp -a dev/home-assistant/config/dashboards .pi/ci-ha-config/
          cp -a dev/home-assistant/config/packages .pi/ci-ha-config/
          cp -a dev/home-assistant/config/www .pi/ci-ha-config/
          cat > .pi/ci-ha-config/.storage/onboarding <<'JSON'
          {
            "version": 4,
            "minor_version": 1,
            "key": "onboarding",
            "data": {
              "done": ["user", "core_config", "analytics", "integration"]
            }
          }
          JSON
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD/.pi/ci-ha-config:/config" \
            ghcr.io/home-assistant/home-assistant:2026.6.1 \
            python -m homeassistant --script auth -c /config add test test

      - name: Start local Home Assistant
        run: |
          set -euo pipefail
          docker run -d \
            --name varco-ci-ha \
            -p 8123:8123 \
            -v "$PWD/.pi/ci-ha-config:/config" \
            ghcr.io/home-assistant/home-assistant:2026.6.1

      - name: Run hass-first local client e2e
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if npm run dev:ha:local-smoke && npm run dev:ha:local-browser; then
              exit 0
            fi
            echo "Home Assistant not ready for hass-first e2e yet ($attempt/60)."
            sleep 5
          done
          docker logs varco-ci-ha
          exit 1

      - name: Stop local Home Assistant
        if: always()
        run: docker rm -f varco-ci-ha || true
