name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: python -m pip install pytest cryptography

      - name: Run unit and integration tests
        run: npm test

      - name: Run type checks
        run: npm run check

      - name: Build local Home Assistant dashboard assets
        run: npm run dev:ha:local-assets

      - name: Prepare Home Assistant e2e config
        run: |
          set -euo pipefail
          docker pull ghcr.io/home-assistant/home-assistant:2026.6.1
          rm -rf .pi/ci-ha-config
          mkdir -p .pi/ci-ha-config/.storage .pi/ci-ha-config/custom_components
          cp dev/home-assistant/config/configuration.yaml .pi/ci-ha-config/configuration.yaml
          python - <<'PY'
          from pathlib import Path
          path = Path('.pi/ci-ha-config/configuration.yaml')
          path.write_text(path.read_text().replace('webrtc_enabled: true', 'webrtc_enabled: false'))
          PY
          cp -a custom_components/varco .pi/ci-ha-config/custom_components/
          cp -a dev/home-assistant/config/dashboards .pi/ci-ha-config/
          cp -a dev/home-assistant/config/packages .pi/ci-ha-config/
          cp -a dev/home-assistant/config/www .pi/ci-ha-config/
          cat > .pi/ci-ha-config/.storage/onboarding <<'JSON'
          {
            "version": 4,
            "minor_version": 1,
            "key": "onboarding",
            "data": {
              "done": ["user", "core_config", "analytics", "integration"]
            }
          }
          JSON
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD/.pi/ci-ha-config:/config" \
            ghcr.io/home-assistant/home-assistant:2026.6.1 \
            python -m homeassistant --script auth -c /config add test test

      - name: Start local Home Assistant
        run: |
          set -euo pipefail
          docker run -d \
            --name varco-ci-ha \
            -p 8123:8123 \
            -v "$PWD/.pi/ci-ha-config:/config" \
            ghcr.io/home-assistant/home-assistant:2026.6.1

      - name: Run Home Assistant browser e2e
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if npm run dev:ha:local-smoke && npm run dev:ha:local-browser && npm run dev:ha:dashboard-export-browser; then
              exit 0
            fi
            echo "Home Assistant not ready for browser e2e yet ($attempt/60)."
            sleep 5
          done
          docker logs varco-ci-ha
          exit 1

      - name: Upload Home Assistant browser e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: home-assistant-browser-e2e
          path: |
            .pi/varco-local-hass-e2e.png
            .pi/varco-dashboard-export-e2e.png
            .pi/varco-dashboard-export-e2e.zip
          if-no-files-found: ignore

      - name: Stop local Home Assistant
        if: always()
        run: docker rm -f varco-ci-ha || true
